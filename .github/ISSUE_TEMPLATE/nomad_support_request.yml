name: Nomad Support Request
description: Request support for Nomad
title: "[Nomad Help]: "
labels: ["support", "triage"]
assignees:
  - spydmobile
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this support request!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what you may have already tried to do!
      placeholder: Tell us what happened!
    validations:
      required: true
  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect / was supposed to happen?
      description: Provide additional context.
