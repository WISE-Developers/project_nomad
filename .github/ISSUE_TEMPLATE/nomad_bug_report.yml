name: Nomad Bug Report
description: File a Nomad bug report
title: "[Nomad Bug]: "
labels: ["bug", "triage"]
assignees:
  - spydmobile
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of Nomad are you running?
      options:
        - MVP (Latest)
        - Other (indicate version in "What happened" above)
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: What browser are you seeing the problem on?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other (indicate in browser "What happened" above)
  - type: dropdown
    id: platform
    attributes:
      label: What platform are you seeing the problem on?
      multiple: true
      options:
        - Windows Bare Metal
        - Windows Container
        - macOS Bare Metal
        - macOS Container
        - Linux Bare Metal
        - Linux Container
        - Other (indicate in platform "What happened" above)
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
      placeholder: Paste your logs here!
